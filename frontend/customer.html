<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customers | Laundry Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style for the Tab Toggle Switch */
        .toggle-container {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            font-weight: bold;
            font-size: 1rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .toggle-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* Hiding/Showing Tabs */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Search Bar Icon styling */
        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .search-wrapper input {
            padding-left: 35px; /* Make room for the emoji/icon */
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 15px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-item">🧺 Shop Floor</a>
        <a href="order.html" class="nav-item">➕ Drop-off</a>
        <a href="customer.html" class="nav-item active">👤 Customers</a>
        <a href="owner.html" class="nav-item">🔒 Owner</a>
    </nav>

    <div class="container">
        <h1 class="page-title">Customer Center</h1>

        <div class="toggle-container">
            <button id="btn-directory" class="toggle-btn active" onclick="switchTab('directory')">Directory</button>
            <button id="btn-add" class="toggle-btn" onclick="switchTab('add')">Add New</button>
        </div>

        <div id="tab-directory" class="tab-content active">
            <div class="card">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search by name..." onkeyup="filterCustomers()">
                </div>
                
                <div id="customerList" style="display: flex; flex-direction: column; gap: 10px;">
                    <p style="color: var(--text-muted)">Loading customers...</p>
                </div>
            </div>
        </div>

        <div id="tab-add" class="tab-content">
            <div class="card">
                <h2 style="margin-top: 0; margin-bottom: 20px;">Register New Customer</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="custName" placeholder="e.g. Maria Santos">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="custPhone" placeholder="e.g. 09123456789">
                </div>
                <button class="btn" onclick="createCustomer()">Register Customer</button>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "http://localhost:8000";
        let allCustomers = []; // We will store the fetched customers here for quick searching

        // --- TAB LOGIC ---
        function switchTab(tabName) {
            // Update Buttons
            document.getElementById('btn-directory').classList.remove('active');
            document.getElementById('btn-add').classList.remove('active');
            document.getElementById(`btn-${tabName}`).classList.add('active');

            // Update Content Views
            document.getElementById('tab-directory').classList.remove('active');
            document.getElementById('tab-add').classList.remove('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Focus the search bar automatically if they switch to directory
            if(tabName === 'directory') {
                document.getElementById('searchInput').focus();
            }
        }

        // --- DATA LOGIC ---
        async function fetchCustomers() {
            try {
                const res = await fetch(`${API_URL}/customers`);
                const data = await res.json();
                
                allCustomers = data.customers; // Save to our global variable
                renderCustomerList(allCustomers); // Draw them on the screen
                
            } catch (error) {
                document.getElementById("customerList").innerHTML = "<p style='color: var(--danger)'>Error loading customers.</p>";
            }
        }

        function renderCustomerList(listToDraw) {
            const listDiv = document.getElementById("customerList");
            listDiv.innerHTML = ""; 

            if (listToDraw.length === 0) {
                listDiv.innerHTML = "<p style='color: var(--text-muted); text-align: center; padding: 20px;'>No customers found.</p>";
                return;
            }

            listToDraw.forEach(c => {
                listDiv.innerHTML += `
                    <div style="padding: 15px; border: 1px solid var(--border); border-radius: 8px; display: flex; justify-content: space-between; align-items: center; background: var(--surface);">
                        <div>
                            <strong style="font-size: 1.1rem; color: var(--primary);">${c.customer_name}</strong>
                            <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 4px;">📞 ${c.number}</div>
                        </div>
                        <div style="font-size: 0.8rem; color: #94A3B8; font-weight: bold;">
                            ID: ${c.customer_id}
                        </div>
                    </div>
                `;
            });
        }

        // --- SEARCH LOGIC ---
        function filterCustomers() {
            // 1. Get what the user typed and make it lowercase
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            
            // 2. Filter the global array based on the name
            const filteredList = allCustomers.filter(customer => {
                return customer.customer_name.toLowerCase().includes(searchTerm);
            });
            
            // 3. Re-draw the list with only the matches
            renderCustomerList(filteredList);
        }

        // --- CREATE LOGIC ---
        async function createCustomer() {
            const name = document.getElementById("custName").value;
            const phone = document.getElementById("custPhone").value;

            if (!name || !phone) {
                alert("Please fill in both name and phone number!");
                return;
            }

            try {
                const res = await fetch(`${API_URL}/customers`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ cust_name: name, number: phone })
                });

                if (res.ok) {
                    // Clear inputs
                    document.getElementById("custName").value = "";
                    document.getElementById("custPhone").value = "";
                    
                    // Re-fetch the data from the server so the new person is in our global list
                    await fetchCustomers(); 
                    
                    // Clear the search bar and switch back to the directory tab to see them!
                    document.getElementById("searchInput").value = "";
                    switchTab('directory');
                    
                } else {
                    alert("Error registering customer.");
                }
            } catch (error) {
                alert("Could not connect to the backend API.");
            }
        }

        // Run this immediately when the page opens
        fetchCustomers();
    </script>
</body>
</html>
