<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shop Floor | Laundry Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-item active">🧺 Shop Floor</a>
        <a href="order.html" class="nav-item">➕ New Drop-off</a>
        <a href="customer.html" class="nav-item">👤 Customers</a>
        <a href="owner.html" class="nav-item">🔒 Owner</a>
    </nav>

    <div class="container">
        <h1 class="page-title">Active Baskets (Shop Floor)</h1>

        <div class="grid-2-col">
            
            <div class="card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <strong style="font-size: 1.2rem;">Order #12</strong>
                    <span style="background: #FEF08A; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8rem;">WASHING</span>
                </div>
                <p style="color: var(--text-muted); margin-bottom: 15px;">Basket ID: 45 | Juan Dela Cruz</p>
                <button class="btn">Move to Drying</button>
            </div>

            <div class="card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <strong style="font-size: 1.2rem;">Order #14</strong>
                    <span style="background: #BFDBFE; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.8rem;">DRYING</span>
                </div>
                <p style="color: var(--text-muted); margin-bottom: 15px;">Basket ID: 48 | Maria Santos</p>
                <button class="btn">Move to Folding</button>
            </div>

        </div>
    </div>

</body>
</html>
